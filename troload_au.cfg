  sql_assets: {
    src_dir: '/tmp/troload/troload/src/local/sql'
    trg_dir: '/test/troload/troload/src/local/sql'
    file_names: ['grant_permsissions.sql']
    file_mode: 640
  }

  python_assets: {
    src_dir: '/tmp/troload/troload/src/local/python'
    trg_dir: '/test/troload/troload/src/local/python'
    file_names: ['accounts.py', 'categories.py', 'transactions.py', 'troload.py']
    file_mode: 640
  }

  modules_assets: {
    src_dir: '/tmp/troload/troload/src/local/python/modules'
    trg_dir: '/test/troload/troload/src/local/python/modules'
    file_names: ['jspgeng.py', 'jsstdrpt.py']
    file_mode: 640
