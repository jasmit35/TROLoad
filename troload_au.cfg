  }

  load_assets: {
    src_dir: '/tmp/troload/troload'
    trg_dir: '/test/troload/troload'
    file_names: ['Dockerfile', 'install-packages.sh', 'requirements.txt']
    file_mode: 640
  }

  bin_assets: {
    src_dir: '/tmp/troload/troload/src/local/bin'
    trg_dir: '/test/troload/troload/src/local/bin'
    file_names: ['runmypy.sh']
    file_mode: 750
  }

  etc_assets: {
    src_dir: '/tmp/troload/troload/src/local/etc'
