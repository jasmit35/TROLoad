
test: {
  assets: ['home', 'log', 'rpt', 'stage', 'etc', 'python', 'tro', 'share', 'sql']
  
  home_assets: {
    src_dir: '/tmp/TROLoad'
    trg_dir: '/test/TROLoad'
    file_names: ['requirements.txt']
    file_mode: '640'
  }

  log_assets: {
    src_dir: '/tmp/TROLoad/local/log'
    trg_dir: '/test/TROLoad/local/log'
    file_names: []
    file_mode: 640
  }

  rpt_assets: {
    src_dir: '/tmp/TROLoad/local/rpt'
    trg_dir: '/test/TROLoad/local/rpt'
    file_names: []
    file_mode: 640
  }

  stage_assets: {
    src_dir: '/tmp/TROLoad/local/stage'
    trg_dir: '/test/TROLoad/local/stage'
    file_names: []
    file_mode: 640
  }

  etc_assets: {
    src_dir: '/tmp/TROLoad/local/etc'
    trg_dir: '/test/TROLoad/local/etc'
    file_names: ['troload.cfg']
    file_mode: 640
  }

  python_assets: {
    src_dir: '/tmp/TROLoad/local/python'
    trg_dir: '/test/TROLoad/local/python'
    file_names: [ '__init__.py', 'transwkbk.py', 'troload.py' ]
    file_mode: 640
  }

  tro_assets: {
    src_dir: '/tmp/TROLoad/local/python'
    trg_dir: '/test/tro/local/python'
    file_names: [ 'accounts.py', 'categories.py', 'transactions.py' ]
    file_mode: 640
  }

  share_assets: {
    src_dir: '/tmp/TROLoad/local/python'
    trg_dir: '/test/local/python'
    file_names: ['base_app.py', 'std_dbconn.py']
    file_mode: 640
  }

  sql_assets: {
    src_dir: '/tmp/TROLoad/local/sql'
    trg_dir: '/test/TROLoad/local/sql'
    file_names: ['set_start.sql', 'set_beginning_balances.sql']
    file_mode: 640
  }
}

